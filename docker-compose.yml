services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # コンテナ内では /app/specs に直接マウントするため上書き
      - SPECS_DIR=./specs
    volumes:
      # 仕様書フォルダをコンテナ内の /app/specs にマウント
      - ./specs:/app/specs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
